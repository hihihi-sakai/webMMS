<header class="bg-green-600">
  <nav aria-label="Global" class="mx-auto flex max-w-7xl items-center justify-between p-6 lg:px-8">
    <div class="flex lg:flex-1">
      <a href="#" class="-m-1.5 flex items-center gap-2 p-1.5">
        <img src="favicon.svg" alt="" class="h-8 w-auto" />
        <span class="text-sm font-bold text-white">Web MMS</span>
      </a>
    </div>


    <div class="flex sm:hidden">
      <button type="button" command="show-modal" commandfor="mobile-menu"
        class="-m-2.5 inline-flex cursor-pointer items-center justify-center rounded-md p-2.5 text-gray-700" ngMenuTrigger #origin
        #trigger="ngMenuTrigger" [menu]="formatMenu()">
        <span class="sr-only">Open main menu</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon"
          aria-hidden="true" class="size-6">
          <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>

    <div class="hidden sm:flex sm:flex-1 sm:justify-end sm:gap-6">
      <a routerLink="/aggregate" routerLinkActive="text-white" [routerLinkActiveOptions]="{ exact: true }"
        class="cursor-pointer text-sm/6 font-semibold text-emerald-100">
        集計
      </a>
      <a routerLink="/score" routerLinkActive="text-white" [routerLinkActiveOptions]="{ exact: true }" class="cursor-pointer text-sm/6 font-semibold text-emerald-100">
        点数
      </a>
    </div>
  </nav>
</header>

<main class="main">
  <section class="content mx-auto w-full max-w-5xl px-4 py-8">
    <router-outlet />
  </section>
</main>


<!-- <button ngMenuTrigger #origin #trigger="ngMenuTrigger" [menu]="formatMenu()">Open Menu</button> -->
<ng-template [cdkConnectedOverlayOpen]="trigger.expanded()" [cdkConnectedOverlay]="{origin, usePopover: 'inline'}"
  [cdkConnectedOverlayPositions]="[
    {originX: 'end', originY: 'bottom', overlayX: 'end', overlayY: 'top', offsetY: 4},
  ]" cdkAttachPopoverAsChild>
  <div ngMenu class="menu" #formatMenu="ngMenu">
    <ng-template ngMenuContent>
      <div ngMenuItem value="aggregate" routerLink="/aggregate" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="cursor-pointer">
        <span class="label">集計</span>
      </div>
      <div ngMenuItem value="score" routerLink="/score" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="cursor-pointer">
        <span class="label">点数</span>
      </div>
    </ng-template>
  </div>
</ng-template>

    <rect x="0" y="0" width="232" height="280" rx="24" ry="24" fill="#fff" stroke="#007a7a" stroke-width="8"/>
    <line x1="10" y1="70" x2="222" y2="70" stroke="#009f9f" stroke-width="7"/>
    <line x1="10" y1="140" x2="222" y2="140" stroke="#009f9f" stroke-width="7"/>
    <line x1="10" y1="210" x2="222" y2="210" stroke="#009f9f" stroke-width="7"/>
    <line x1="116" y1="10" x2="116" y2="270" stroke="#009f9f" stroke-width="7"/>
    <text x="58" y="58" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#555">+</text>
    <text x="174" y="58" text-anchor="middle" font-family="sans-serif" font-size="42" fill="#555">-</text>
    <text x="58" y="128" text-anchor="middle" font-family="sans-serif" font-size="38" fill="#333">30</text>
    <text x="174" y="128" text-anchor="middle" font-family="sans-serif" font-size="38" fill="#333">8</text>
    <text x="58" y="198" text-anchor="middle" font-family="sans-serif" font-size="38" fill="#333">12</text>
    <text x="174" y="198" text-anchor="middle" font-family="sans-serif" font-size="38" fill="#333">20</text>
    <text x="58" y="262" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="38" fill="#cc2222">42</text>
    <text x="174" y="262" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="38" fill="#cc2222">28</text>

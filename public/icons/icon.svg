<svg xmlns="http://www.w3.org/2000/svg" viewBox="90 58 388 372">
  <!-- 麻雀牌「中」(白地に赤文字): 小さめ -->
  <rect x="96" y="64" width="160" height="208" rx="18" ry="18" fill="#fff" stroke="#bbb" stroke-width="6"/>
  <text x="176" y="204" text-anchor="middle" font-family="serif" font-weight="bold" font-size="128" fill="#cc2222">中</text>

  <!-- 右下: スコア集計を表す表アイコン (大きめ) -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="22 14 98 94">
  <!-- 麻雀牌「中」(白地に赤文字): 小さめ -->
  <rect x="24" y="16" width="40" height="52" rx="5" ry="5" fill="#fff" stroke="#bbb" stroke-width="2"/>
  <text x="44" y="52" text-anchor="middle" font-family="serif" font-weight="bold" font-size="32" fill="#cc2222">中</text>

  <!-- 右下: スコア集計を表す表アイコン (大きめ) -->
  <g transform="translate(60, 28)">
    <!-- 集計表の背景 -->
    <rect x="0" y="0" width="58" height="70" rx="6" ry="6" fill="#fff" stroke="#007a7a" stroke-width="2.5"/>
    <!-- 横線 (行) -->
    <line x1="3" y1="17.5" x2="55" y2="17.5" stroke="#009f9f" stroke-width="2"/>
    <line x1="3" y1="35" x2="55" y2="35" stroke="#009f9f" stroke-width="2"/>
    <line x1="3" y1="52.5" x2="55" y2="52.5" stroke="#009f9f" stroke-width="2"/>
    <!-- 縦線 (列) -->
    <line x1="29" y1="3" x2="29" y2="67" stroke="#009f9f" stroke-width="2"/>
    <!-- 数字 (点数を表現) -->
    <text x="14.5" y="14.5" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">+</text>
    <text x="43.5" y="14.5" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#555">-</text>
    <text x="14.5" y="32" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#333">30</text>
    <text x="43.5" y="32" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#333">8</text>
    <text x="14.5" y="49.5" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#333">12</text>
    <text x="43.5" y="49.5" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#333">20</text>
    <!-- 合計行 -->
    <text x="14.5" y="66" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9.5" fill="#cc2222">42</text>
    <text x="43.5" y="66" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9.5" fill="#cc2222">28</text>
  </g>
</svg>
